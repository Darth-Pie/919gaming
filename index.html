<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>919 Gaming — A Library of Worlds</title>
<meta property="og:title" content="919 Gaming" />
<meta property="og:description" content="A library of worlds — every 919 Gaming project, one shelf." />
<meta property="og:url" content="https://919gaming.com/" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme: dark;
    --shadow:#0d0906; --leather:#3a2417; --leather-dk:#261609;
    --parchment:#ecdcb6; --parchment-dk:#d9c49a;
    --gold:#c9a96a; --gold-bright:#ecd8a4;
    --wax:#7c1f1f; --wax-dk:#5c1414;
    --ink:#3a2a1a; --ink-soft:#6b5436; --ink-faint:#8a6f44;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh; position:relative; overflow-x:hidden;
    font-family:'EB Garamond',serif; color:var(--parchment);
    background:radial-gradient(ellipse at 50% 22%, #2a1f16 0%, #160f0a 55%, var(--shadow) 100%);
  }
  a{ color:var(--gold); text-decoration:none; }
  a:hover{ color:var(--gold-bright); }
  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:rgba(58,42,26,0.35); border-radius:4px; }

  /* ---- ambient ---- */
  .motes{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .mote{ position:absolute; bottom:-12px; width:3px; height:3px; border-radius:50%;
    background:var(--gold-bright); opacity:0.35; animation:drift linear infinite; }
  .wall{ position:fixed; inset:0; z-index:0; pointer-events:none;
    background:repeating-linear-gradient(90deg, rgba(0,0,0,0.10) 0 2px, transparent 2px 7px),
      radial-gradient(ellipse at 50% 30%, rgba(120,90,50,0.10), transparent 60%); }

  @keyframes drift{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.5; } 90%{ opacity:0.3; }
    100%{ transform:translateY(-115vh) translateX(24px); opacity:0; }
  }
  @keyframes fadeUp{ 0%{opacity:0; transform:translateY(14px);} 100%{opacity:1; transform:translateY(0);} }
  @keyframes coverSwing{ 0%{ transform:rotateY(0deg); } 100%{ transform:rotateY(-162deg); } }
  @keyframes spreadIn{ 0%{ opacity:0; transform:translateY(18px) scale(0.97); } 100%{ opacity:1; transform:translateY(0) scale(1); } }
  @keyframes backdropIn{ 0%{opacity:0;} 100%{opacity:1;} }

  /* ---- layout ---- */
  .stage{ position:relative; z-index:1; max-width:1040px; margin:0 auto;
    padding:44px 24px 110px; display:flex; flex-direction:column; align-items:center; }
  .masthead{ width:100%; text-align:center; animation:fadeUp 0.8s ease both; }
  .rule-row{ display:flex; align-items:center; justify-content:center; gap:16px;
    color:var(--gold); opacity:0.7; margin-bottom:14px; }
  .rule-row .line{ height:1px; width:60px; }
  .rule-row .line.l{ background:linear-gradient(90deg,transparent,var(--gold)); }
  .rule-row .line.r{ background:linear-gradient(270deg,transparent,var(--gold)); }
  h1.title{ font-family:'Cinzel Decorative',serif; font-weight:900;
    font-size:clamp(34px,6vw,58px); letter-spacing:0.03em; margin:0; white-space:nowrap;
    color:var(--gold-bright); text-shadow:0 2px 6px rgba(0,0,0,0.7), 0 0 26px rgba(201,169,106,0.22); }
  .subtitle{ font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.42em;
    text-transform:uppercase; color:var(--gold); opacity:0.85; margin:14px 0 0; }
  .prompt{ font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.22em;
    text-transform:uppercase; color:var(--ink-faint); margin:26px 0 18px;
    animation:fadeUp 0.8s ease 0.15s both; }

  /* ---- shelf ---- */
  .shelf-wrap{ width:100%; animation:fadeUp 0.9s ease 0.25s both; }
  .shelf{ position:relative; display:flex; align-items:flex-end; justify-content:center;
    flex-wrap:wrap; gap:14px; padding:0 28px; min-height:326px; }
  .plank{ height:26px; margin-top:-2px; border-radius:3px;
    background:linear-gradient(var(--leather),#241609 70%,#160d05);
    box-shadow:0 22px 40px rgba(0,0,0,0.65), inset 0 2px 0 rgba(255,220,150,0.12), inset 0 -6px 10px rgba(0,0,0,0.5); }
  .plank-lip{ height:12px; margin:0 8px; border-radius:0 0 6px 6px;
    background:linear-gradient(#160d05,#0b0704); opacity:0.8; }

  .spine{ position:relative; width:66px; cursor:pointer; border-radius:4px 6px 6px 4px;
    transform-origin:bottom center; padding:16px 0;
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    transition:transform 0.28s cubic-bezier(.3,1.3,.5,1), box-shadow 0.28s ease;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,0.4), inset -4px 0 8px rgba(0,0,0,0.55),
      inset 4px 0 6px rgba(255,220,150,0.10), 0 18px 26px rgba(0,0,0,0.55); }
  .spine:hover, .spine:focus-visible{ transform:translateY(-22px); outline:none;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,0.4), inset -4px 0 8px rgba(0,0,0,0.55),
      0 26px 34px rgba(0,0,0,0.6), 0 0 22px var(--glow,rgba(201,169,106,0.28)); }
  .spine .band{ width:100%; height:16px; opacity:0.6;
    background:repeating-linear-gradient(var(--band,#241407) 0 3px, transparent 3px 8px); }
  .spine .spine-title{ writing-mode:vertical-rl; text-orientation:mixed;
    font-family:'Cinzel',serif; font-weight:600; font-size:17px; letter-spacing:0.15em;
    text-shadow:0 1px 2px rgba(0,0,0,0.85); flex:1; display:flex; align-items:center; padding:8px 0; }
  .spine .emblem{ width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.08em; }

  .ghost{ width:60px; height:262px; border-radius:4px 6px 6px 4px;
    border:1.5px dashed rgba(201,169,106,0.32); background:rgba(201,169,106,0.03);
    display:flex; align-items:center; justify-content:center; }
  .ghost span{ writing-mode:vertical-rl; text-orientation:mixed; font-family:'Cinzel',serif;
    font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:rgba(201,169,106,0.42); }

  .footer-note{ position:fixed; bottom:12px; left:0; right:0; text-align:center;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.18em;
    color:rgba(236,216,164,0.32); z-index:1; }

  /* ---- opened book overlay ---- */
  .overlay{ position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center; padding:24px;
    background:radial-gradient(ellipse at 50% 40%, rgba(20,14,9,0.86), rgba(6,4,2,0.95)); }
  .overlay.show{ display:flex; animation:backdropIn 0.4s ease both; }
  .book{ position:relative; width:min(920px,94vw); height:min(600px,84vh);
    perspective:2400px; animation:spreadIn 0.5s cubic-bezier(.2,.8,.3,1) both; }
  .close{ position:absolute; top:-14px; right:-6px; z-index:20; width:40px; height:40px;
    border-radius:50%; border:none; cursor:pointer; font-size:20px; font-family:'Cinzel',serif;
    color:var(--gold-bright); background:radial-gradient(circle at 35% 30%,#9a2b2b,var(--wax-dk));
    box-shadow:0 6px 16px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,0,0,0.4); }
  .spread{ position:absolute; inset:0; display:flex; background:var(--leather-dk);
    border-radius:6px; overflow:hidden; box-shadow:0 44px 90px rgba(0,0,0,0.7), 0 0 0 1px var(--leather); }
  .page{ flex:1 1 50%; padding:38px; overflow-y:auto; color:var(--ink);
    background:radial-gradient(ellipse at 20% 0%, rgba(0,0,0,0.08), transparent 60%),
      linear-gradient(var(--parchment),var(--parchment-dk)); }
  .page.left{ border-right:2px solid rgba(0,0,0,0.25); box-shadow:inset -18px 0 30px -20px rgba(0,0,0,0.5); }
  .page.right{ box-shadow:inset 18px 0 30px -20px rgba(0,0,0,0.5); display:flex; flex-direction:column; }
  .chapter-label{ font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--ink-soft); margin:0 0 8px; }
  .chapter-title{ font-family:'Cinzel Decorative',serif; font-size:clamp(26px,3.4vw,36px);
    margin:0 0 22px; color:var(--wax); line-height:1.05; }
  .chapter-title.sm{ font-size:22px; margin:0 0 16px; }
  .flavor{ line-height:1.7; font-size:17.5px; margin:0; }
  .desc{ line-height:1.68; font-size:16.5px; margin:0 0 26px; }

  .seal-wrap{ margin-top:auto; display:flex; flex-direction:column; align-items:center;
    gap:11px; padding-top:12px; }
  .seal{ width:200px; height:200px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; transition:transform 0.25s ease;
    box-shadow:0 10px 22px rgba(0,0,0,0.4), inset 0 0 16px rgba(0,0,0,0.45); }
  .seal:hover{ transform:scale(1.06); }
  .seal-label{ font-family:'Cinzel',serif; font-size:12px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--ink-soft); margin:0; }
  .seal-host{ font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.06em;
    color:var(--ink-faint); margin:0; word-break:break-all; text-align:center; }

  .links{ display:flex; flex-direction:column; gap:2px; }
  .links a{ display:flex; align-items:center; justify-content:space-between;
    font-family:'Cinzel',serif; font-size:15px; letter-spacing:0.03em; color:var(--ink);
    padding:12px 2px; border-bottom:1px dashed rgba(58,42,26,0.28);
    transition:padding-left 0.2s ease, color 0.2s ease; }
  .links a:last-child{ border-bottom:none; }
  .links a:hover{ padding-left:8px; color:var(--wax); }
  .links a .arrow{ color:var(--wax); }

  /* hinged cover swings open on mount */
  .cover{ position:absolute; inset:0; transform-origin:left center; transform-style:preserve-3d;
    z-index:10; pointer-events:none; animation:coverSwing 1.15s cubic-bezier(.65,0,.35,1) 0.15s both; }
  .cover-face{ position:absolute; inset:0; backface-visibility:hidden; border-radius:6px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:30px;
    box-shadow:0 40px 80px rgba(0,0,0,0.6), inset 0 0 0 10px rgba(20,12,6,0.7), inset 0 0 60px rgba(0,0,0,0.5); }
  .cover-title{ font-family:'Cinzel Decorative',serif; font-weight:700;
    font-size:clamp(24px,3.2vw,34px); letter-spacing:0.03em; color:var(--gold-bright);
    text-align:center; margin:0; text-shadow:0 2px 4px rgba(0,0,0,0.6); }

  @media (max-width:640px){
    .spread{ flex-direction:column; }
    .page.left{ border-right:none; border-bottom:2px solid rgba(0,0,0,0.25); flex:0 0 40%; }
  }
  @media (prefers-reduced-motion: reduce){
    .mote,.cover,.book,.masthead,.prompt,.shelf-wrap{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="motes" id="motes"></div>
  <div class="wall"></div>

  <div class="stage">
    <div class="masthead">
      <div class="rule-row">
        <span class="line l"></span>
        <svg width="26" height="26" viewBox="0 0 60 60" fill="none"><path d="M30 6 L34 26 L54 30 L34 34 L30 54 L26 34 L6 30 L26 26 Z" fill="#c9a96a"/></svg>
        <span class="line r"></span>
      </div>
      <h1 class="title">919 Gaming</h1>
      <p class="subtitle">A&nbsp;&nbsp;Library&nbsp;&nbsp;of&nbsp;&nbsp;Worlds</p>
    </div>

    <p class="prompt">Draw a tome from the shelf</p>

    <div class="shelf-wrap">
      <div class="shelf" id="shelf"></div>
      <div class="plank"></div>
      <div class="plank-lip"></div>
    </div>
  </div>

  <div class="footer-note">919gaming.com</div>

  <!-- opened book overlay -->
  <div class="overlay" id="overlay">
    <div class="book" id="book">
      <button class="close" id="close" aria-label="Close">&times;</button>
      <div class="spread" id="spread"></div>
    </div>
  </div>

<script>
  /* =========================================================================
     ADD A PROJECT: append an object to this array. That's the only edit needed.
       kind:        'project'  -> shows a description + "Enter" wax seal
                    'journal'  -> shows your links list (your personal area)
       spine:       leather gradient + accent colour + emblem for the shelf
     ========================================================================= */
  const books = [
    {
      kind: 'journal',
      label: 'About the Keeper',
      title: "The Keeper's Journal",
      cover: 'radial-gradient(ellipse at 30% 20%, #5a3d24, #3a2417 55%, #261609 100%)',
      spine: { grad: 'linear-gradient(90deg,#5a3d24 0%,#3a2417 42%,#5a3d24 88%,#2a1810 100%)',
               band: '#241407', glow: 'rgba(201,169,106,0.28)', title: '#ecd8a4',
               emblem: 'ring', mark: 'K', accent: '#c9a96a', height: 320 },
      // Left page: your bio.  Right page: your links.
      flavor: 'Enter the dark mind of the Keeper, and find the keys to the realms beyond.',
      links: [
        { name: 'Discord', url: 'https://discord.gg/fleet919' },
        { name: 'Send a Raven (Email)', url: 'mailto:darthchurchill@gmail.com' }
      ]
    },
    {
      kind: 'project',
      label: 'Call of Cthulhu · 1921',
      title: 'The Blooming',
      cover: 'radial-gradient(ellipse at 30% 20%, #43512f, #212b1c 55%, #0f150b 100%)',
      spine: { grad: 'linear-gradient(90deg,#43512f 0%,#212b1c 42%,#3a4a30 88%,#0f150b 100%)',
               band: '#0c1207', glow: 'rgba(120,160,90,0.3)', title: '#d8c98a',
               emblem: 'orchid', accent: '#cdbb7a', height: 308 },
      flavor: 'Autumn 1921.  Miskatonic University reports unusual activity in nearby Dunwich.  Dare you venture into the hills to investigate the blooming of a rare orchid?',
      description: 'A Call of Cthulhu one-shot steeped in H.P. Lovecraft’s cosmic horror. Investigators are drawn to the blooming of an impossibly rare orchid, and to the truth waiting patiently behind it.',
      url: 'https://thebloom.919gaming.com/',
      host: 'thebloom.919gaming.com'
    },
    {
      kind: 'project',
      label: 'Pantheon: Rise of the Fallen',
      title: 'Squall Riders',
      cover: 'radial-gradient(ellipse at 30% 20%, #31465a, #1a2836 55%, #0c1520 100%)',
      spine: { grad: 'linear-gradient(90deg,#31465a 0%,#1a2836 42%,#2a3b4d 88%,#0c1520 100%)',
               band: '#081018', glow: 'rgba(120,170,220,0.32)', title: '#bcd2e2',
               emblem: 'ring', mark: 'SR', accent: '#9fc0dd', height: 316 },
      flavor: 'A storm gathers on the horizon of a fallen world, and riders are answering its call. The muster has only just begun.',
      description: 'A multi-game gaming community forming around the MMORPG Pantheon: Rise of the Fallen. Much is yet unwritten, but the banner is raised and the ranks are opening.',
      url: 'https://squallriders.919gaming.com/',
      host: 'squallriders.919gaming.com'
    }
  ];

  const STAR = '<svg width="24" height="24" viewBox="0 0 60 60" fill="none"><path d="M30 6 L34 26 L54 30 L34 34 L30 54 L26 34 L6 30 L26 26 Z" fill="#ecd8a4"/></svg>';
  const SIGIL = '<svg width="96" height="96" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="54" stroke="#c9a96a" stroke-width="2" opacity="0.75"/><circle cx="60" cy="60" r="42" stroke="#c9a96a" stroke-width="1" opacity="0.45"/><path d="M60 12 L67 52 L107 60 L67 68 L60 108 L53 68 L13 60 L53 52 Z" stroke="#ecd8a4" stroke-width="1.6" fill="none"/><circle cx="60" cy="60" r="5" fill="#c9a96a"/></svg>';
  const SEAL_STAR = '<img src="assets/sandstone.png" width="200" height="200" alt="seal"/>';

  function emblemSVG(spine){
    if (spine.emblem === 'orchid')
      return '<svg width="22" height="22" viewBox="0 0 60 60" fill="none"><path d="M30 8 C36 20 48 22 48 34 C48 44 40 52 30 52 C20 52 12 44 12 34 C12 22 24 20 30 8 Z" fill="none" stroke="'+spine.accent+'" stroke-width="2"/><circle cx="30" cy="34" r="5" fill="#7c1f1f"/></svg>';
    // 'ring' emblem: circle with a mark/letter
    const filled = spine.mark === 'K';
    return '<span class="emblem" style="'+(filled
      ? 'border:1.5px solid '+spine.accent+';color:'+spine.title
      : 'border:1.5px solid '+spine.accent+';color:'+spine.title)+'">'+(spine.mark||'')+'</span>';
  }

  /* ---- build the shelf ---- */
  const shelf = document.getElementById('shelf');
  books.forEach((b, i) => {
    const s = b.spine;
    const el = document.createElement('div');
    el.className = 'spine';
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', 'Open ' + b.title);
    el.style.height = (s.height || 312) + 'px';
    el.style.background = s.grad;
    el.style.setProperty('--band', s.band);
    el.style.setProperty('--glow', s.glow);
    const emblem = (s.emblem === 'orchid')
      ? emblemSVG(s)
      : (s.mark ? '<span class="emblem" style="border:1.5px solid '+s.accent+';color:'+s.title+'">'+s.mark+'</span>' : STAR);
    el.innerHTML =
      '<div class="band"></div>' +
      (s.emblem === 'orchid' ? emblemSVG(s) : STAR) +
      '<div class="spine-title" style="color:'+s.title+'">'+b.title+'</div>' +
      emblem +
      '<div class="band"></div>';
    el.addEventListener('click', () => openBook(i));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBook(i); } });
    shelf.appendChild(el);
  });

  // ghost slot — signals room for more realms
  const ghost = document.createElement('div');
  ghost.className = 'ghost';
  ghost.title = 'Room for more realms';
  ghost.innerHTML = '<span>More realms to come</span>';
  shelf.appendChild(ghost);

  /* ---- open / close the book ---- */
  const overlay = document.getElementById('overlay');
  const book = document.getElementById('book');
  const spread = document.getElementById('spread');

  function rightPage(b){
    if (b.kind === 'journal'){
      const rows = b.links.map(l =>
        '<a href="'+l.url+'"><span>'+l.name+'</span><span class="arrow">&rarr;</span></a>').join('');
      return '<div class="page right">' +
        '<p class="chapter-label">The Fellowship</p>' +
        '<h3 class="chapter-title sm">Find Me in the Wild</h3>' +
        '<div class="links">'+rows+'</div></div>';
    }
    return '<div class="page right">' +
      '<p class="chapter-label">The Tale</p>' +
      '<h3 class="chapter-title sm">Of This Realm</h3>' +
      '<p class="desc">'+b.description+'</p>' +
      '<div class="seal-wrap">' +
        '<a class="seal" href="'+b.url+'" target="_blank" rel="noopener" aria-label="Enter this realm">'+SEAL_STAR+'</a>' +
        '<p class="seal-label">Break the Seal to Enter</p>' +
        '<p class="seal-host">'+b.host+'</p>' +
      '</div></div>';
  }

  function openBook(i){
    const b = books[i];
    spread.innerHTML =
      '<div class="page left">' +
        '<p class="chapter-label">'+b.label+'</p>' +
        '<h2 class="chapter-title">'+b.title+'</h2>' +
        '<p class="flavor">'+b.flavor+'</p>' +
      '</div>' +
      rightPage(b) +
      '<div class="cover"><div class="cover-face" style="background:'+b.cover+'">' +
        SIGIL + '<h2 class="cover-title">'+b.title+'</h2>' +
      '</div></div>';
    overlay.classList.add('show');
    // re-trigger the spreadIn / coverSwing animations
    book.style.animation = 'none'; void book.offsetWidth; book.style.animation = '';
  }

  function closeBook(){ overlay.classList.remove('show'); }

  document.getElementById('close').addEventListener('click', closeBook);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeBook(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBook(); });

  /* ---- ambient dust motes ---- */
  const motes = document.getElementById('motes');
  for (let i = 0; i < 20; i++){
    const m = document.createElement('div');
    m.className = 'mote';
    m.style.left = (Math.random() * 100) + 'vw';
    m.style.animationDelay = (Math.random() * 14) + 's';
    m.style.animationDuration = (10 + Math.random() * 9) + 's';
    motes.appendChild(m);
  }
</script>
</body>
</html>
